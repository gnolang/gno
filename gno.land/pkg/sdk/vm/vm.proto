syntax = "proto3";
package vm;

option go_package = "github.com/gnolang/gno/gno.land/pkg/sdk/vm/pb";

// imports
import "github.com/gnolang/gno/tm2/pkg/std/std.proto";
import "github.com/gnolang/gno/tm2/pkg/sdk/params/params.proto";

// messages
message m_call {
	string caller = 1;
	string send = 2;
	string max_deposit = 3;
	string pkg_path = 4;
	string func = 5;
	repeated string args = 6;
}

message m_run {
	string caller = 1;
	string send = 2;
	string max_deposit = 3;
	std.MemPackage package = 4;
}

message m_addpkg {
	string creator = 1;
	std.MemPackage package = 2;
	string send = 3;
	string max_deposit = 4;
}

message InvalidPkgPathError {
}

message NoRenderDeclError {
}

message PkgExistError {
}

message InvalidStmtError {
}

message InvalidExprError {
}

message TypeCheckError {
	repeated string errors = 1;
}

message UnauthorizedUserError {
}

message InvalidPackageError {
}

message InvalidFileError {
}

message ObjectNotFoundError {
}

message GenesisState {
	Params params = 1;
	repeated string realm_params = 2;
}

message Params {
	string sys_names_pkg_path = 1 [json_name = "sysnames_pkgpath"];
	string sys_cla_pkg_path = 2 [json_name = "syscla_pkgpath"];
	string chain_domain = 3;
	string default_deposit = 4;
	string storage_price = 5;
	string storage_fee_collector = 6;
}