syntax = "proto3";
package gno;

option go_package = "github.com/gnolang/gno/gno.land/pkg/gnoland/pb";

// imports
import "github.com/gnolang/gno/tm2/pkg/std/std.proto";
import "github.com/gnolang/gno/tm2/pkg/sdk/auth/auth.proto";
import "github.com/gnolang/gno/tm2/pkg/sdk/bank/bank.proto";
import "github.com/gnolang/gno/gno.land/pkg/sdk/vm/vm.proto";
import "github.com/gnolang/gno/tm2/pkg/sdk/params/params.proto";

// messages
message Account {
	std.BaseAccount base_account = 1 [json_name = "BaseAccount"];
	uint64 attributes = 2;
}

message SessionAccount {
	std.BaseSessionAccount base_session_account = 1 [json_name = "BaseSessionAccount"];
	repeated string allow_paths = 2;
}

message GenesisState {
	repeated string balances = 1;
	repeated TxWithMetadata txs = 2;
	auth.GenesisState auth = 3;
	bank.GenesisState bank = 4;
	vm.GenesisState vm = 5;
	repeated string past_chain_i_ds = 6 [json_name = "past_chain_ids"];
	sint64 initial_height = 7;
	string gas_replay_mode = 8;
}

message TxWithMetadata {
	std.Tx tx = 1;
	GnoTxMetadata metadata = 2;
}

message GnoTxMetadata {
	sint64 timestamp = 1;
	sint64 block_height = 2;
	string chain_id = 3;
	bool failed = 4;
	repeated SignerAccountInfo signer_info = 5;
	sint64 gas_used = 6;
	sint64 gas_wanted = 7;
}

message SignerAccountInfo {
	string address = 1;
	uint64 account_num = 2;
	uint64 sequence = 3;
}