# Reusable workflow for Gno packages/realms: fmt + lint + test.
on:
  workflow_call:
    inputs:
      path:
        description: "Path to run gno tools on"
        required: true
        type: string
      go-version:
        description: "Go version to use"
        required: false
        type: string
        default: "1.24.x"
      debug:
        description: "Enable debug logs"
        required: false
        type: boolean
      run-fmt:
        description: "Run gno fmt"
        required: false
        type: boolean
        default: true
      run-lint:
        description: "Run gno lint"
        required: false
        type: boolean
        default: true
      run-test:
        description: "Run gno test"
        required: false
        type: boolean
        default: true

permissions: {}

jobs:
  fmt:
    name: fmt
    if: inputs.run-fmt
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ inputs.go-version }}
      - run: go run ./gnovm/cmd/gno -C "${INPUTS_PATH}" fmt -diff ./...
        env:
          INPUTS_PATH: ${{ inputs.path }}

  lint:
    name: lint
    if: inputs.run-lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ inputs.go-version }}
      - run: go run ./gnovm/cmd/gno lint -C "${INPUTS_PATH}" -v ./...
        env:
          INPUTS_PATH: ${{ inputs.path }}

  test:
    name: test
    if: inputs.run-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Setup debug env
        if: inputs.debug
        run: |
          export LOG_PATH_DIR="${RUNNER_TEMP}/logs"
          mkdir -p "$LOG_PATH_DIR"
          echo "LOG_LEVEL=debug" >> "$GITHUB_ENV"
          echo "LOG_PATH_DIR=$LOG_PATH_DIR" >> "$GITHUB_ENV"

      - name: Run gno test
        run: go run ./gnovm/cmd/gno test -C "${INPUTS_PATH}" -v -print-runtime-metrics -print-events ./...
        env:
          INPUTS_PATH: ${{ inputs.path }}
