# Reusable workflow for Gno packages/realms: fmt + lint + test.
on:
  workflow_call:
    inputs:
      path:
        description: "Path to run gno tools on"
        required: true
        type: string
      go-version:
        description: "Go version to use; defaults to the version in go.mod"
        required: false
        type: string
        default: ""
      debug:
        description: "Enable debug logs"
        required: false
        type: boolean
      run-fmt:
        description: "Run gno fmt"
        required: false
        type: boolean
        default: true
      run-lint:
        description: "Run gno lint"
        required: false
        type: boolean
        default: true
      run-test:
        description: "Run gno test"
        required: false
        type: boolean
        default: true

permissions: {}

jobs:
  fmt:
    name: fmt
    if: inputs.run-fmt
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ inputs.go-version }}
          go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}
      - run: go run ./gnovm/cmd/gno -C "${INPUTS_PATH}" fmt -diff ./...
        env:
          INPUTS_PATH: ${{ inputs.path }}

  lint:
    name: lint
    if: inputs.run-lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ inputs.go-version }}
          go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}
      - run: go run ./gnovm/cmd/gno lint -C "${INPUTS_PATH}" -v ./...
        env:
          INPUTS_PATH: ${{ inputs.path }}

  test:
    name: test
    if: inputs.run-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ inputs.go-version }}
          go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}

      - name: Setup debug env
        if: inputs.debug
        run: |
          export LOG_PATH_DIR="${RUNNER_TEMP}/logs"
          mkdir -p "$LOG_PATH_DIR"
          echo "LOG_LEVEL=debug" >> "$GITHUB_ENV"
          echo "LOG_PATH_DIR=$LOG_PATH_DIR" >> "$GITHUB_ENV"

      - name: Run gno test
        run: go run ./gnovm/cmd/gno test -C "${INPUTS_PATH}" -v -print-runtime-metrics -print-events ./...
        env:
          INPUTS_PATH: ${{ inputs.path }}
