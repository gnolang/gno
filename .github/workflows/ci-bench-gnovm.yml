name: ci / bench-gnovm

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  benchops:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Setup go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Run native benchmarks
        working-directory: gnovm
        run: make run.bench.native

      - name: Run storage benchmarks
        working-directory: gnovm
        run: make run.bench.storage

      - name: Run opcode benchmarks
        working-directory: gnovm
        run: make run.bench.opcode

      - name: Upload benchmark results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-results
          path: gnovm/*_results_*.csv
          retention-days: 30
