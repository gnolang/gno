name: ci / bench-gnovm

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  benchops:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run native benchmarks
        working-directory: gnovm
        run: make run.bench.native

      - name: Run storage benchmarks
        working-directory: gnovm
        run: make run.bench.storage

      - name: Run opcode benchmarks
        working-directory: gnovm
        run: make run.bench.opcode

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-results
          path: gnovm/*_results_*.csv
          retention-days: 30
