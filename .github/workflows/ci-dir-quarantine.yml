name: ci / examples-quarantine

on:
  push:
    branches:
      - master
  pull_request:
    paths:
      - gnovm/**
      - examples/**
      - examples-quarantine/**
      - gno.land/pkg/gnoland/**
      - gno.land/pkg/integration/**
      - .github/workflows/ci-dir-quarantine.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # The Go driver at examples-quarantine/quarantine_test.go is the single
  # source of truth for quarantine package correctness. It boots a unified
  # package view across examples/ and examples-quarantine/ so cross-tree
  # imports resolve at runtime — something `gno fmt`, `gno lint`, and `gno
  # tool transpile` cannot do because each is rooted in a single workspace
  # (gnowork.toml) and a quarantine→safe import would otherwise be reached
  # for via the remote package fetcher.
  #
  # Consequently we don't invoke the _ci-gno.yml reusable workflow here.
  # Lint/fmt regressions in the quarantine set are tolerated.

  go-tests:
    uses: ./.github/workflows/_ci-go.yml
    with:
      modulepath: "examples-quarantine"
    secrets:
      codecov-token: ${{ secrets.CODECOV_TOKEN }}
