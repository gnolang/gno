name: ci / examples-quarantine

on:
  push:
    branches:
      - master
  pull_request:
    paths:
      - gnovm/**
      - examples/**
      - examples-quarantine/**
      - gno.land/pkg/gnoland/**
      - gno.land/pkg/integration/**
      - .github/workflows/ci-dir-quarantine.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # The Go driver at examples-quarantine/quarantine_test.go is the single
  # source of truth for quarantine package correctness. It boots a unified
  # package view across examples/ and examples-quarantine/ so cross-tree
  # imports resolve at runtime — something `gno fmt`, `gno lint`, and `gno
  # tool transpile` cannot do because each is rooted in a single workspace
  # (gnowork.toml) and a quarantine→safe import would otherwise be reached
  # for via the remote package fetcher.
  #
  # Consequently we don't invoke the _ci-gno.yml reusable workflow here.
  # Lint/fmt regressions in the quarantine set are tolerated.

  check-deps:
    name: check-deps
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      # Fails if any package still in examples/ imports a package now in
      # examples-quarantine/. Guards the "examples/ is self-consistent"
      # invariant against future PRs that touch either tree.
      - name: Verify no cross-tree dep regressions
        run: |
          out=$(./misc/quarantine/check-deps.sh)
          if [ -n "$out" ]; then
            echo "examples/ -> examples-quarantine/ dep regressions:"
            echo "$out"
            exit 1
          fi

  go-driver:
    name: go-driver
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      # The driver runs both TestQuarantineRealms (gno test equivalent over
      # all quarantine packages) and TestQuarantineRealmsLoad (genesis-load
      # smoke test on an in-memory node).
      - run: go test -p 1 -timeout=30m -v ./examples-quarantine/...
        continue-on-error: true
