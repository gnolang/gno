name: meta / codeql

on:
  push:
    branches: ["master", "chain/*"]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/meta-codeql.yml'
  pull_request:
    branches: ["master", "chain/*"]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/meta-codeql.yml'
  schedule:
    - cron: '22 17 * * 3'

permissions: {}

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      security-events: write # to upload SARIF results
      actions: read # to read workflow run details
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v3
        with:
          languages: go
          build-mode: autobuild
      - uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v3
        with:
          category: "/language:go"
