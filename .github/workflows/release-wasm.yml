name: Release WASM

on:
  push:
    tags:
      - 'chain/**'

jobs:
  build-and-release:
    name: Build and release gno.wasm
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version-file: go.mod

      - name: Build gno.wasm
        working-directory: gnovm
        env:
          GOARCH: wasm
          GOOS: js
        run: |
          mkdir -p build
          go build \
            -ldflags "-X github.com/gnolang/gno/gnovm/pkg/gnoenv._GNOROOT=${{ github.workspace }}/" \
            -o build/gno.wasm \
            ./cmd/gno

      - name: Create root.zip
        run: |
          zip -qq -i "*.toml" -i "*.gno" \
            -x "*_test.gno" -x "*_filetest.gno" \
            -r root.zip \
            gnovm/stdlibs gnovm/tests/stdlibs examples

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gnovm/build/gno.wasm
            root.zip
          body: |
            GnoVM WebAssembly build for tag `${{ github.ref_name }}`.

            Built from [gnovm/cmd/gno](https://github.com/gnolang/gno/tree/${{ github.ref_name }}/gnovm/cmd/gno).

            ## Assets
            - `gno.wasm` — GnoVM WebAssembly binary (GOOS=js GOARCH=wasm)
            - `root.zip` — GnoVM standard libraries and examples (stdlibs + tests/stdlibs + examples)

            ## Usage (play.gno.land / gnovm consumers)
            ```
            https://github.com/gnolang/gno/releases/download/<encoded-tag>/gno.wasm
            https://github.com/gnolang/gno/releases/download/<encoded-tag>/root.zip
            ```
