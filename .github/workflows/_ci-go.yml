# Reusable workflow for Go modules: lint + build + test with coverage.
on:
  workflow_call:
    inputs:
      modulepath:
        required: true
        type: string
      tests-extra-args:
        required: false
        type: string
      tests-ts-seq:
        required: false
        type: boolean
      go-version:
        description: "Go version to use; defaults to the version in go.mod"
        required: false
        type: string
        default: ""
    secrets:
      codecov-token:
        required: true

permissions: {}

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ inputs.go-version }}
          go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}
      - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8
        with:
          working-directory: ${{ inputs.modulepath }}
          args: --config=${{ github.workspace }}/.github/golangci.yml
          version: v2.3 # sync with misc/devdeps

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ inputs.go-version }}
          go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}
      - name: Check generated files are up to date
        working-directory: ${{ inputs.modulepath }}
        run: |
          if make -qp | grep -q '^generate:'; then
            make generate
            if [ "$(git status -s)" != "" ]; then
              echo "command 'make generate' creates files that differ from the git tree, please run 'make generate' and commit:"
              git status -s
              git diff
              exit 1
            fi
          else
            echo "'make generate' rule not found, skipping."
          fi

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ inputs.go-version }}
          go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}
      - name: Go test
        working-directory: ${{ inputs.modulepath }}
        env:
          SEQ_TS: ${{ inputs.tests-ts-seq }}
          TXTARCOVERDIR: /tmp/txtarcoverdir
          GOCOVERDIR: /tmp/gocoverdir
          COVERDIR: /tmp/coverdir
          INPUTS_MODULEPATH: ${{ inputs.modulepath }}
          INPUTS_TESTS_EXTRA_ARGS: ${{ inputs.tests-extra-args }}
        run: |
          set -x

          mkdir -p "$GOCOVERDIR" "$TXTARCOVERDIR" "$COVERDIR"

          export filter="-pkg=github.com/gnolang/gno/${INPUTS_MODULEPATH}/..."

          # INPUTS_TESTS_EXTRA_ARGS must word-split into flags
          # shellcheck disable=SC2086
          go test -covermode=set -timeout 30m ${INPUTS_TESTS_EXTRA_ARGS} ./... -test.gocoverdir="$GOCOVERDIR"

          (set +x; echo 'go coverage results:')
          go tool covdata percent "$filter" -i="$GOCOVERDIR"
          (set +x; echo 'txtar coverage results:')
          go tool covdata percent "$filter" -i="$TXTARCOVERDIR"

          go tool covdata textfmt -v 1 "$filter" -i="$GOCOVERDIR,$TXTARCOVERDIR" -o gocoverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ${{ inputs.modulepath }}/gocoverage.out
          flags: ${{ inputs.modulepath }}
          token: ${{ secrets.codecov-token }} # zizmor: ignore[secrets-outside-env]
          verbose: true
