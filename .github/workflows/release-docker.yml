# Build and Push Docker Images using Docker Bake
name: release / docker

on:
  push:
    branches:
      - chain/*
    tags:
      - chain/*
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. chain/gnoland1.1)"
        required: true

permissions:
  contents: read

jobs:
  bake:
    strategy:
      matrix:
        image: [gnoland,gnokey,gnoweb,gno,gnofaucet,gnodev,gnocontribs]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write # for GHA cache (docker buildx cache-to/from=type=gha)
      packages: write # to push images to ghcr.io
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}
          persist-credentials: false

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Resolve image tag
        id: resolve_tag
        run: |
          INPUT="${INPUTS_TAG}"
          if [ -n "$INPUT" ]; then
            # chain/gnolang1.2 → chain-gnolang1.2
            echo "tag=${INPUT/\//-}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi
        env:
          INPUTS_TAG: ${{ inputs.tag }}

      - name: Extract metadata
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=${{ steps.resolve_tag.outputs.tag }},enable=${{ inputs.tag != '' }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.authors=Gno Core Team

      - name: Bake build and push
        uses: docker/bake-action@a66e1c87e2eca0503c343edf1d208c716d54b8a8 # v7.1.0
        with:
          source: . # use checked-out code, not git URL at GITHUB_SHA
          files: |
            misc/deployments/bake/docker-bake.hcl
            cwd://${{ steps.meta.outputs.bake-file-tags }}
            cwd://${{ steps.meta.outputs.bake-file-labels }}
          push: true
          targets: ${{ matrix.image }}
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
            *.context=.
