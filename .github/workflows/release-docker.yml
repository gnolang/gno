# Minimal cache-validation workflow.
# Strips everything to the bone: one image, one platform, no bake, no attestation.
# If caching works here, the problem is in the bake/HCL setup.
# If it doesn't, the problem is in the GHA cache plumbing on the runner.
name: release / docker

on:
  push:
    branches:
      - chain/tm2-backup
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      packages: write

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Compute build version
        id: build_version
        run: |
          V=$(git describe --tags --exact-match 2>/dev/null \
              || echo "$(git rev-parse --abbrev-ref HEAD).$(git rev-list --count HEAD)+$(git rev-parse --short HEAD)")
          echo "version=$V" >> "$GITHUB_OUTPUT"

      # On self-hosted runners, ACTIONS_CACHE_URL and ACTIONS_RUNTIME_TOKEN
      # may not be set. type=gha silently does nothing without them.
      - name: Expose GitHub Runtime
        uses: crazy-max/ghaction-github-runtime@v3

      - name: Debug — verify GHA cache vars are set
        run: |
          echo "ACTIONS_CACHE_URL is ${ACTIONS_CACHE_URL:+SET (length ${#ACTIONS_CACHE_URL})}${ACTIONS_CACHE_URL:-EMPTY <-- THIS IS THE PROBLEM}"
          echo "ACTIONS_RUNTIME_TOKEN is ${ACTIONS_RUNTIME_TOKEN:+SET (length ${#ACTIONS_RUNTIME_TOKEN})}${ACTIONS_RUNTIME_TOKEN:-EMPTY <-- THIS IS THE PROBLEM}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Build and push (single platform, no bake)
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6
        with:
          context: .
          target: gnoland
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository }}/gnoland:cache-test
          build-args: |
            BUILD_VERSION=${{ steps.build_version.outputs.version }}
          cache-from: type=gha,scope=gnoland
          cache-to: type=gha,mode=max,scope=gnoland
