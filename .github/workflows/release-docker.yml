# Build and Push Docker Images using Docker Bake
name: release / docker

on:
  push:
    branches:
      - chain/*
    tags:
      - chain/*
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. chain/gnoland1.1)"
        required: true

permissions:
  contents: read

jobs:
  bake:
    strategy:
      matrix:
        image: [gnoland,gnokey,gnoweb,gno,gnofaucet,gnodev,gnocontribs]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write # for GHA cache (docker buildx cache-to/from=type=gha)
      packages: write # to push images to ghcr.io
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ inputs.tag || github.ref }}
          persist-credentials: false

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Resolve image tag
        id: resolve_tag
        run: |
          INPUT="${INPUTS_TAG}"
          if [ -n "$INPUT" ]; then
            # chain/gnolang1.2 → chain-gnolang1.2
            echo "tag=${INPUT/\//-}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi
        env:
          INPUTS_TAG: ${{ inputs.tag }}

      - name: Extract metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=${{ steps.resolve_tag.outputs.tag }},enable=${{ inputs.tag != '' }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.authors=Gno Core Team

      # Using Github Context. Overriding context with an explicit `set` is required
      - name: Bake build and push
        uses: docker/bake-action@5be5f02ff8819ecd3092ea6b2e6261c31774f2b4 # v6
        with:
          files: |
            misc/deployments/bake/docker-bake.hcl
            cwd://${{ steps.meta.outputs.bake-file-tags }}
            cwd://${{ steps.meta.outputs.bake-file-labels }}
          push: true
          targets: ${{ matrix.image }}
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
            *.context=.
