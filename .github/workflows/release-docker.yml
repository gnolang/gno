# Build and Push Docker Images using Docker Bake
name: release / docker

on:
  push:
    branches:
      - chain/tm2-backup
    tags:
      - chain/*
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. chain/gnoland1.1)"
        required: true

permissions:
  contents: read

jobs:
  bake:
    runs-on: gnolang-self-runner-large
    strategy:
      matrix:
        image: [gnoland,gnokey,gnoweb,gno,gnofaucet,gnodev,gnocontribs]
    
    permissions:
      contents: read
      actions: write # for GHA cache (docker buildx cache-to/from=type=gha)
      packages: write # to push images to ghcr.io
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ inputs.tag || github.ref }}
          persist-credentials: false
          # Need full history + tags so `git describe --tags` works below.
          fetch-depth: 0

      - name: Compute build version
        id: build_version
        run: |
          V=$(git describe --tags --exact-match 2>/dev/null \
              || echo "$(git rev-parse --abbrev-ref HEAD).$(git rev-list --count HEAD)+$(git rev-parse --short HEAD)")
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          # Route docker.io pulls through Google's public read-through cache to
          # avoid Docker Hub's anonymous / abuse-prevention rate limits (429)
          # hit by the self-hosted runner's shared egress IP. Affects base
          # images only: golang:1.24-alpine, alpine:3, docker (all library/*).
          # See: https://docs.docker.com/docker-hub/usage/#abuse-rate-limit
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Resolve image tag
        id: resolve_tag
        run: |
          INPUT="${INPUTS_TAG}"
          if [ -n "$INPUT" ]; then
            # chain/gnolang1.2 → chain-gnolang1.2
            echo "tag=${INPUT/\//-}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi
        env:
          INPUTS_TAG: ${{ inputs.tag }}

      - name: Extract metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=${{ steps.resolve_tag.outputs.tag }},enable=${{ inputs.tag != '' }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.authors=Gno Core Team

      # Expose GitHub Runtime
      - name: Expose GitHub Runtime
        if: env.ACTIONS_CACHE_URL == ''
        uses: crazy-max/ghaction-github-runtime@v4

      - name: Bake build and push
        uses: docker/bake-action@5be5f02ff8819ecd3092ea6b2e6261c31774f2b4 # v6
        env:
          # Forwarded into the bake variable
          BUILD_VERSION: ${{ steps.build_version.outputs.version }}
        with:
          source: . # use checked-out code, not git URL at GITHUB_SHA
          files: |
            misc/deployments/bake/docker-bake.hcl
            cwd://${{ steps.meta.outputs.bake-file-tags }}
            cwd://${{ steps.meta.outputs.bake-file-labels }}
          push: true
          targets: ${{ matrix.image }}
          # GHA cache scope is per-image
          set: |
            *.cache-from=type=gha,scope=${{ matrix.image }}
            *.cache-to=type=gha,mode=max,scope=${{ matrix.image }}
            *.context=.
