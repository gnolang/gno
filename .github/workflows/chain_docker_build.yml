# Build and Push Docker Images using Docker Bake
name: Build and Push Chain Images

on:
  push:
    branches:
      - chain/*
    tags:
      - chain/*
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. chain/gnoland1.1)"
        required: true

permissions:
  contents: read
  actions: write # useful for gha caching
  packages: write

jobs:
  bake:
    strategy:
      matrix:
        image: [gnoland,gnokey,gnoweb,gno,gnofaucet,gnodev,gnocontribs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tag
        id: resolve_tag
        run: |
          INPUT="${{ inputs.tag }}"
          if [ -n "$INPUT" ]; then
            # chain/gnolang1.2 → chain-gnolang1.2
            echo "tag=${INPUT/\//-}" >> $GITHUB_OUTPUT
          else
            echo "tag=" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=${{ steps.resolve_tag.outputs.tag }},enable=${{ inputs.tag != '' }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.authors=Gno Core Team

      # Using Github Context. Overriding context with an explicit `set` is required
      - name: Bake build and push
        uses: docker/bake-action@v6
        with:
          files: |
            misc/deployments/bake/docker-bake.hcl
            cwd://${{ steps.meta.outputs.bake-file-tags }}
            cwd://${{ steps.meta.outputs.bake-file-labels }}
          push: true
          targets: ${{ matrix.image }}
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
            *.context=.
