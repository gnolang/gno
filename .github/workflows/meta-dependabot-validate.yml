name: dependabot-validate

on:
  pull_request:
    paths:
      - '.github/dependabot.yml'
      - '.github/workflows/dependabot-validate.yml'

jobs:
  validate:
    name: meta/dependabot-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: marocchino/validate-dependabot@v3
