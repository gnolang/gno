# Unified release workflow: master push releases + nightly scheduled releases.
# Replaces the old releaser-master.yml and releaser-nightly.yml.
name: release / goreleaser

on:
  push:
    branches:
      - master
  schedule:
    - cron: "0 0 * * 2-6" # nightly Tue-Sat
  workflow_dispatch:
    inputs:
      snapshot:
        description: "Build as snapshot (no publish)"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}

permissions: {}

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write # to create GitHub releases
      id-token: write # for keyless signing via sigstore/cosign
      packages: write # to push images to ghcr.io
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      # Dummy tag needed for goreleaser on non-tag pushes (non-snapshot runs)
      - name: Create a dummy tag to avoid goreleaser failure
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.snapshot != true)
        run: git tag v0.0.0 master

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false # zizmor: cache-poisoning — goreleaser publishes artifacts from this job

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Determine release args
        id: args
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUTS_SNAPSHOT: ${{ inputs.snapshot }}
        run: |
          if [ "$EVENT_NAME" = "schedule" ] || [ "$INPUTS_SNAPSHOT" = "true" ]; then
            echo "goreleaser-args=release --clean --nightly --snapshot --config ./.github/goreleaser.yaml" >> "$GITHUB_OUTPUT"
            echo "tag-version=nightly" >> "$GITHUB_OUTPUT"
          else
            echo "goreleaser-args=release --clean --nightly --config ./.github/goreleaser.yaml" >> "$GITHUB_OUTPUT"
            echo "tag-version=master" >> "$GITHUB_OUTPUT"
          fi

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser-pro
          version: ~> v2
          args: ${{ steps.args.outputs.goreleaser-args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }} # zizmor: ignore[secrets-outside-env]
          TAG_VERSION: ${{ steps.args.outputs.tag-version }}
