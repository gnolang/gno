syntax = "proto3";
package auth;

option go_package = "github.com/gnolang/gno/tm2/pkg/sdk/auth/pb";

// imports
import "github.com/gnolang/gno/tm2/pkg/std/std.proto";
import "google/protobuf/any.proto";

// messages
message m_create_session {
	string creator = 1;
	google.protobuf.Any session_key = 2;
	sint64 expires_at = 3;
	repeated string allow_paths = 4;
	string spend_limit = 5;
	sint64 spend_period = 6;
}

message m_revoke_session {
	string creator = 1;
	google.protobuf.Any session_key = 2;
}

message m_revoke_all_sessions {
	string creator = 1;
}