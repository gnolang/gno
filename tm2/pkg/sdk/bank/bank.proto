syntax = "proto3";
package bank;

option go_package = "github.com/gnolang/gno/tm2/pkg/sdk/bank/pb";

// messages
message NoInputsError {
}

message NoOutputsError {
}

message InputOutputMismatchError {
}

message MsgSend {
	string from_address = 1;
	string to_address = 2;
	string amount = 3;
}

message TransferEvent {
	string from = 1;
	string to = 2;
	string amount = 3;
}

message CoinSpentEvent {
	string spender = 1;
	string amount = 2;
}

message CoinReceivedEvent {
	string receiver = 1;
	string amount = 2;
}
