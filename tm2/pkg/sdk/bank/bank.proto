syntax = "proto3";
package bank;

option go_package = "github.com/gnolang/gno/tm2/pkg/sdk/bank/pb";

// messages
message NoInputsError {
}

message NoOutputsError {
}

message InputOutputMismatchError {
}

message MsgSend {
	string from_address = 1;
	string to_address = 2;
	string amount = 3;
}

message GenesisState {
	Params params = 1;
}

message Params {
	repeated string restricted_denoms = 1;
}